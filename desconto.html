<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Desconto</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>
  <header>
    <h1>Calculadora de Desconto</h1>
  </header>
  <main>
    <form id="descontoForm">
      <input type="number" id="valor" placeholder="Valor original">
      <input type="number" id="desconto" placeholder="Desconto %">
      <button type="button" onclick="calcularDesconto()">Calcular</button>
    </form>
    <p id="resultado"></p>
    <a href="index.html">Voltar</a>
  </main>

  <script>
    function calcularDesconto() {
      const valor = parseFloat(document.getElementById('valor').value);
      const desconto = parseFloat(document.getElementById('desconto').value);
      if (!isNaN(valor) && !isNaN(desconto)) {
        const resultado = valor - (valor * (desconto / 100));
        document.getElementById('resultado').textContent = `Valor com desconto: ${resultado}`;
      } else {
        document.getElementById('resultado').textContent = "Digite valores válidos.";
      }
    }
  </script>
</body>
</html>
