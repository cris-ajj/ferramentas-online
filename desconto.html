<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Desconto</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Calculadora de Desconto</h1>

<input id="preco" placeholder="Preço original">
<input id="desconto" placeholder="Desconto (%)">

<button onclick="calcularDesconto()">Calcular</button>
<button onclick="limpar()">Limpar</button>

<h2 id="resultado"></h2>
<a href="index.html">⬅ Voltar</a>
</div>

<script>
function calcularDesconto() {
    let preco = parseFloat(document.getElementById("preco").value);
    let desconto = parseFloat(document.getElementById("desconto").value);
    if(!isNaN(preco) && !isNaN(desconto)) {
        let resultado = preco - (preco * desconto / 100);
        document.getElementById("resultado").innerText = "Preço com desconto: " + resultado.toFixed(2);
    } else {
        document.getElementById("resultado").innerText = "Digite números válidos!";
    }
}

function limpar() {
    document.getElementById("preco").value = "";
    document.getElementById("desconto").value = "";
    document.getElementById("resultado").innerText = "";
}
</script>
</body>
</html>
