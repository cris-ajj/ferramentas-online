<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Desconto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Calculadora de Desconto</h1>
    <a href="index.html" class="voltar">← Voltar</a>
  </header>

  <main>
    <label>Preço Original: <input type="number" id="preco"></label>
    <label>Desconto (%): <input type="number" id="desconto"></label>
    <button onclick="calcularDesconto()">Calcular</button>
    <p id="resultado"></p>
  </main>

  <script>
    function calcularDesconto() {
      const preco = parseFloat(document.getElementById('preco').value);
      const desconto = parseFloat(document.getElementById('desconto').value);
      if (!isNaN(preco) && !isNaN(desconto)) {
        const valorFinal = preco - (preco * desconto / 100);
        document.getElementById('resultado').innerText = "Preço com desconto: R$ " + valorFinal.toFixed(2);
      } else {
        document.getElementById('resultado').innerText = "Preencha os campos corretamente!";
      }
    }
  </script>
</body>
</html>
