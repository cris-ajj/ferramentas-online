<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Juros</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1>Calculadora de Juros</h1>

<input id="capital" placeholder="Capital inicial">
<input id="taxa" placeholder="Taxa (%)">
<input id="periodo" placeholder="Período (meses)">

<button onclick="calcularJuros()">Calcular</button>
<button onclick="limpar()">Limpar</button>

<h2 id="resultado"></h2>
<a href="index.html">⬅ Voltar</a>
</div>

<script>
function calcularJuros() {
    let c = parseFloat(document.getElementById("capital").value);
    let t = parseFloat(document.getElementById("taxa").value);
    let p = parseFloat(document.getElementById("periodo").value);
    if(!isNaN(c) && !isNaN(t) && !isNaN(p)) {
        let resultado = c * (1 + t/100)**p;
        document.getElementById("resultado").innerText = "Montante: " + resultado.toFixed(2);
    } else {
        document.getElementById("resultado").innerText = "Digite números válidos!";
    }
}

function limpar() {
    document.getElementById("capital").value = "";
    document.getElementById("taxa").value = "";
    document.getElementById("periodo").value = "";
    document.getElementById("resultado").innerText = "";
}
</script>
</body>
</html>
