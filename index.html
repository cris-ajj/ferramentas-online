<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Ferramentas Online</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🧮 Ferramentas Online</h1>
<p>Calculadora simples para o dia a dia</p>

<div class="card">

<h2>Calculadora de Porcentagem</h2>

<input type="number" id="valor" placeholder="Digite o valor">

<input type="number" id="porcentagem" placeholder="Digite a porcentagem">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

</div>

<script>

function calcular(){

let valor = document.getElementById("valor").value
let porcentagem = document.getElementById("porcentagem").value

if(valor === "" || porcentagem === ""){
document.getElementById("resultado").innerText = "Preencha os campos"
return
}

let resultado = (valor * porcentagem) / 100

document.getElementById("resultado").innerText =
porcentagem + "% de " + valor + " = " + resultado

}

</script>

</body>
</html>
