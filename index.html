<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Ferramentas Online</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Ferramentas Online</h1>
<p>Calculadora de porcentagem</p>

<div class="card">

<input type="number" id="valor" placeholder="Digite o valor">

<input type="number" id="porcentagem" placeholder="Digite a porcentagem">

<button onclick="calcular()">Calcular</button>

<div id="resultado"></div>

</div>

<p class="contador">Visitantes: <span id="visitas"></span></p>

</div>

<script>

function calcular(){

let valor = Number(document.getElementById("valor").value)
let porcentagem = Number(document.getElementById("porcentagem").value)

if(!valor || !porcentagem){
document.getElementById("resultado").innerText = "Digite os valores"
return
}

let resultado = (valor * porcentagem) / 100

document.getElementById("resultado").innerText =
porcentagem + "% de " + valor + " = " + resultado

}

let visitas = localStorage.getItem("visitas")

if(!visitas){
visitas = 1
}else{
visitas = Number(visitas) + 1
}

localStorage.setItem("visitas", visitas)

document.getElementById("visitas").innerText = visitas

</script>

</body>
</html>
