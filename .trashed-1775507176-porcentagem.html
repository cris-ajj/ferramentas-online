<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Porcentagem</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Calculadora de Porcentagem</h1>
</header>

<div class="container">

<input id="numero" placeholder="Número">

<input id="porcentagem" placeholder="Porcentagem (%)">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>

</div>

<script>

function calcular(){

let numero=document.getElementById("numero").value

let porcentagem=document.getElementById("porcentagem").value

let resultado=(numero*porcentagem)/100

document.getElementById("resultado").innerText="Resultado: "+resultado

}

</script>

</body>
</html>
